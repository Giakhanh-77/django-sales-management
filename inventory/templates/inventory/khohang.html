{% extends "base.html" %}
{% block dashboard_content %}
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<style>
/* ===== CHUNG ===== */
#tableKho {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
}

#tableKho th,
#tableKho td {
    vertical-align: middle;
    padding: 10px 10px;
    line-height: 1.4;
}

/* ===== CỘT RỘNG (DESKTOP) ===== */
#tableKho th:nth-child(1),
#tableKho td:nth-child(1) {
    width: 48px;
    text-align: center;
}

#tableKho th:nth-child(3),
#tableKho td:nth-child(3) {
    width: 80px;
    text-align: center;
}

#tableKho th:nth-child(4),
#tableKho td:nth-child(4) {
    width: 110px;
}

#tableKho th:nth-child(5),
#tableKho td:nth-child(5) {
    width: 90px;
    text-align: center;
}

#tableKho th:nth-child(6),
#tableKho td:nth-child(6) {
    width: 85px;
    text-align: center;
}

/* ===== TÊN SẢN PHẨM – KHÔNG LỆCH ===== */
.product-name {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    overflow: hidden;
    white-space: normal;
    word-break: break-word;
}

/* ==============================
   TABLET
   ============================== */
@media (max-width: 992px) {

    #tableKho {
        font-size: 0.9rem;
    }

    #tableKho th:nth-child(5),
    #tableKho td:nth-child(5),
    #tableKho th:nth-child(6),
    #tableKho td:nth-child(6) {
        width: 75px;
    }

    .product-name {
        -webkit-line-clamp: 2;
    }

    #tableKho .badge {
        font-size: 0.75rem;
        padding: 4px 8px;
        line-height: 1;
    }

    #tableKho .btn {
        font-size: 0.75rem;
        padding: 5px 8px;
        line-height: 1;
    }
}

/* ==============================
   MOBILE
   ============================== */
@media (max-width: 768px) {

    .d-flex.justify-content-between {
        flex-direction: column;
        gap: 8px;
    }

    .input-group.w-50 {
        width: 100% !important;
    }

    #btnReload {
        width: 100%;
    }

    .table-responsive {
        overflow-x: hidden;
    }

    #tableKho {
        font-size: 0.85rem;
    }

    /* Ẩn cột phụ */
    #tableKho th:nth-child(4),
    #tableKho td:nth-child(4) {
        display: none;
    }

    /* Gọn trạng thái + hành động */
    #tableKho th:nth-child(5),
    #tableKho td:nth-child(5),
    #tableKho th:nth-child(6),
    #tableKho td:nth-child(6) {
        width: 70px;
        padding: 8px 4px;
    }

    .product-name {
        -webkit-line-clamp: 2;
    }

    #tableKho .badge {
        font-size: 0.65rem;
        padding: 4px 6px;
        line-height: 1;
    }

    #tableKho .btn {
        font-size: 0.7rem;
        padding: 5px 6px;
        line-height: 1;
    }
}

/* ==============================
   MODAL
   ============================== */
#nhapHangModal .modal-dialog {
    max-width: 420px;
}

@media (max-width: 576px) {
    #nhapHangModal .modal-dialog {
        max-width: 95%;
    }
}

/* ===== ĐẨY MODAL NHẬP HÀNG XUỐNG THÊM ===== */
#nhapHangModal .modal-dialog {
    margin-top: 100px; /* desktop */
}

@media (max-width: 768px) {
    #nhapHangModal .modal-dialog {
        margin-top: 100px; /* mobile */
    }
}
</style>

<div class="container mt-4">
  <h2 class="mb-4 text-center text-primary fw-bold">
    <i class="bi bi-boxes me-2"></i>
    Quản lý kho hàng
  </h2>

  <!-- Bộ lọc -->
  <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
    <div class="input-group w-50">
      <span class="input-group-text bg-light">
        <i class="bi bi-search"></i>
      </span>
      <input type="text"
             id="searchInput"
             class="form-control"
             placeholder="Tìm sản phẩm...">
      <button class="btn btn-outline-primary" id="btnSearch">
        <i class="bi bi-search me-1"></i>
        Tìm
      </button>
    </div>

    <button class="btn btn-outline-secondary" id="btnReload">
      <i class="bi bi-arrow-clockwise me-1"></i>
      Tải lại
    </button>
  </div>

  <!-- Bảng -->
  <div class="table-responsive">
    <table class="table table-hover align-middle" id="tableKho">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Tên sản phẩm</th>
          <th>Tồn kho</th>
          <th>Mức cảnh báo</th>
          <th>Trạng thái</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody id="khoBody">
        <tr>
          <td colspan="6" class="text-center text-muted">
            Đang tải dữ liệu...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="nhapHangModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          <i class="bi bi-box-arrow-in-down me-2"></i>
          Nhập thêm hàng
        </h5>
        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="nhapHangForm">
          <input type="hidden" id="nhapHangId">

          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-box me-1"></i>
              Tên sản phẩm
            </label>
            <input type="text"
                   id="tenSanPham"
                   class="form-control"
                   disabled>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-plus-circle me-1"></i>
              Số lượng nhập thêm
            </label>
            <input type="number"
                   id="soLuongNhap"
                   class="form-control"
                   min="1"
                   required>
          </div>

          <button type="submit" class="btn btn-success w-100">
            <i class="bi bi-check-circle me-1"></i>
            Xác nhận nhập hàng
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const API_URL = "/api/inventory/khohang/";
  const body = document.getElementById("khoBody");
  const toastContainer = document.getElementById("toastContainer");
  const modal = new bootstrap.Modal(document.getElementById("nhapHangModal"));
  const searchInput = document.getElementById("searchInput");
  const btnSearch = document.getElementById("btnSearch");
  const btnReload = document.getElementById("btnReload");
  let dataKho = [];

  function getCookie(name) {
    let cookieValue = null;
    document.cookie.split(";").forEach(c => {
      c = c.trim();
      if (c.startsWith(name + "=")) cookieValue = decodeURIComponent(c.substring(name.length + 1));
    });
    return cookieValue;
  }
  const csrftoken = getCookie("csrftoken");

  function showToast(msg, type="success") {
    const toast = document.createElement("div");
    toast.className = `toast text-white ${type==="error"?"bg-danger":"bg-success"}`;
    toast.innerHTML = `<div class="toast-body">${msg}</div>`;
    toastContainer.appendChild(toast);
    new bootstrap.Toast(toast,{delay:2000}).show();
    toast.addEventListener("hidden.bs.toast",()=>toast.remove());
  }

  async function loadKho() {
    body.innerHTML = `<tr><td colspan="6" class="text-center">⏳ Đang tải...</td></tr>`;
    const res = await fetch(API_URL);
    dataKho = await res.json();
    renderTable(dataKho);
  }

  function renderTable(data) {
    body.innerHTML = "";
    data.forEach(item => {
      body.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${item.id}</td>
          <td><div class="product-name">${item.ten_san_pham}</div></td>
          <td class="${item.so_luong_ton <= item.muc_canh_bao ? 'text-danger fw-bold':''}">
            ${item.so_luong_ton}
          </td>
          <td>${item.muc_canh_bao}</td>
          <td>
            <span class="badge ${item.so_luong_ton <= item.muc_canh_bao ? 'bg-danger':'bg-success'}">
              ${item.so_luong_ton <= item.muc_canh_bao ? 'Cảnh báo':'Ổn định'}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="openNhapHang(${item.id})">📥</button>
          </td>
        </tr>
      `);
    });
  }

  window.openNhapHang = id => {
    const sp = dataKho.find(x => x.id === id);
    nhapHangId.value = id;
    tenSanPham.value = sp.ten_san_pham;
    modal.show();
  };

  nhapHangForm.addEventListener("submit", async e => {
    e.preventDefault();
    await fetch(`${API_URL}${nhapHangId.value}/nhap_hang/`,{
      method:"POST",
      headers:{"Content-Type":"application/json","X-CSRFToken":csrftoken},
      body:JSON.stringify({so_luong_nhap:soLuongNhap.value})
    });
    modal.hide();
    loadKho();
    showToast("Nhập hàng thành công!");
  });

  btnSearch.onclick = () => renderTable(dataKho.filter(x =>
    x.ten_san_pham.toLowerCase().includes(searchInput.value.toLowerCase())
  ));
  btnReload.onclick = loadKho;

  loadKho();
});
</script>

{% endblock dashboard_content %}
